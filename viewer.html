<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: monospace; }
    canvas { display: block; position: relative; z-index: 0; }
    #info {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #eee;
      background: rgba(0,0,0,0.55);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.7;
      pointer-events: none;
      z-index: 10;
    }
    #info span { color: #7ecfff; }
    #selected-info {
      position: absolute;
      top: 12px;
      right: 12px;
      color: #eee;
      background: rgba(0,0,0,0.55);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.7;
      pointer-events: none;
      display: none;
      z-index: 10;
    }
    #selected-info span { color: #ffe066; }
    #selected-info .name { color: #7ecfff; font-weight: bold; }
    #controls {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #aaa;
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
    }
    #mode-btns {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: none;
      gap: 6px;
      z-index: 10;
    }
    #mode-btns button {
      background: rgba(0,0,0,0.6);
      color: #eee;
      border: 1px solid #555;
      border-radius: 5px;
      padding: 6px 14px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #mode-btns button.active {
      background: #2a4a7a;
      border-color: #7ecfff;
      color: #7ecfff;
    }
    #mode-btns button:hover:not(.active) { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div id="info">
    <b>human_head.glb</b><br>
    <span id="origin-info">Loading model...</span><br>
    <span style="color:#ff6b6b;">&#9679;</span> World origin (0,0,0)<br>
    <span style="color:#7ecfff;">&#9679;</span> Model origin reference<br>
    Camera pos: <span id="cam-pos">—</span><br>
    Camera angle: <span id="cam-rot">—</span>
  </div>

  <div id="selected-info"></div>

  <div id="version" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:#ccc;font-family:monospace;font-size:13px;pointer-events:none;user-select:none;background:rgba(0,0,0,0.6);padding:4px 14px;border-radius:20px;z-index:10;white-space:nowrap;">v0.1.0</div>

  <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;white-space:nowrap;">
    <button id="btn-reset" title="Reset all parts to their original positions" style="background:rgba(0,0,0,0.6);color:#eee;border:1px solid #555;border-radius:6px;padding:6px 14px;font-family:monospace;font-size:13px;cursor:pointer;">&#8635; Reset positions</button>
    <button id="btn-reset-cam" title="Reset camera to starting view" style="background:rgba(0,0,0,0.6);color:#eee;border:1px solid #555;border-radius:6px;padding:6px 14px;font-family:monospace;font-size:13px;cursor:pointer;">&#9654; Reset camera</button>
  </div>

  <div id="controls">
    Left drag: rotate &nbsp;|&nbsp; Right drag: pan &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; <b>Double-click</b>: select &amp; move part &nbsp;|&nbsp; Esc: deselect
  </div>

  <div id="mode-btns">
    <button id="btn-translate" class="active">Move (G)</button>
    <button id="btn-rotate">Rotate (R)</button>
    <button id="btn-scale">Scale (S)</button>
    <button id="btn-deselect">Deselect (Esc)</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // --- Scene setup ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // CSS2D label renderer (overlays on top of WebGL canvas)
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    labelRenderer.domElement.style.zIndex = '5';
    document.body.appendChild(labelRenderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 1000);
    camera.position.set(0, 0, 2);

    const orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.07;

    // --- TransformControls ---
    const transformControls = new TransformControls(camera, renderer.domElement);
    transformControls.setMode('translate');
    scene.add(transformControls);

    // Disable orbit while dragging transform gizmo
    transformControls.addEventListener('dragging-changed', (e) => {
      orbitControls.enabled = !e.value;
    });

    // --- Lighting ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(2, 4, 3);
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.4);
    fillLight.position.set(-3, 0, -2);
    scene.add(fillLight);

    // --- World origin marker ---
    const originGeo = new THREE.SphereGeometry(0.012, 16, 16);
    const originMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
    const originMarker = new THREE.Mesh(originGeo, originMat);
    scene.add(originMarker);

    // --- Axis scale: lines + ticks + labels from 0 to 50 ---
    const SCALE_MAX = 50;
    const TICK_EVERY = 5;
    const TICK_SIZE = 1.2; // tick arm length in world units

    const axisGroup = new THREE.Group();
    scene.add(axisGroup);

    const axesDef = [
      { dir: new THREE.Vector3(1, 0, 0), color: '#ff4444', name: 'X',
        perp1: new THREE.Vector3(0, 1, 0), perp2: new THREE.Vector3(0, 0, 1) },
      { dir: new THREE.Vector3(0, 1, 0), color: '#44ff44', name: 'Y',
        perp1: new THREE.Vector3(1, 0, 0), perp2: new THREE.Vector3(0, 0, 1) },
      { dir: new THREE.Vector3(0, 0, 1), color: '#4488ff', name: 'Z',
        perp1: new THREE.Vector3(1, 0, 0), perp2: new THREE.Vector3(0, 1, 0) },
    ];

    axesDef.forEach(({ dir, color, name, perp1 }) => {
      // Axis line 0 → SCALE_MAX
      const pts = [new THREE.Vector3(), dir.clone().multiplyScalar(SCALE_MAX)];
      const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
      const lineMat = new THREE.LineBasicMaterial({ color });
      axisGroup.add(new THREE.Line(lineGeo, lineMat));

      // Axis label at end
      const endLabel = document.createElement('div');
      endLabel.textContent = name;
      endLabel.style.cssText = `color:${color};font:bold 16px monospace;text-shadow:0 0 4px #000;`;
      const endObj = new CSS2DObject(endLabel);
      endObj.position.copy(dir.clone().multiplyScalar(SCALE_MAX + 2));
      axisGroup.add(endObj);

      // Ticks + number labels every TICK_EVERY units
      for (let v = TICK_EVERY; v <= SCALE_MAX; v += TICK_EVERY) {
        const origin = dir.clone().multiplyScalar(v);

        // Tick line (cross-hair on one perpendicular)
        const tp = [
          origin.clone().addScaledVector(perp1, -TICK_SIZE),
          origin.clone().addScaledVector(perp1,  TICK_SIZE),
        ];
        const tGeo = new THREE.BufferGeometry().setFromPoints(tp);
        axisGroup.add(new THREE.Line(tGeo, new THREE.LineBasicMaterial({ color })));

        // Number label
        const div = document.createElement('div');
        div.textContent = v;
        div.style.cssText = `color:${color};font:bold 15px monospace;opacity:0.9;text-shadow:0 0 4px #000;`;
        const label = new CSS2DObject(div);
        label.position.copy(origin.clone().addScaledVector(perp1, TICK_SIZE + 1.5));
        axisGroup.add(label);
      }
    });

    // --- Model origin marker ---
    const modelOriginGeo = new THREE.SphereGeometry(0.012, 16, 16);
    const modelOriginMat = new THREE.MeshBasicMaterial({ color: 0x7ecfff });
    const modelOriginMarker = new THREE.Mesh(modelOriginGeo, modelOriginMat);
    scene.add(modelOriginMarker);

    // --- Selection state ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let allMeshes = [];
    const initialTransforms = new Map(); // mesh -> {position, quaternion, scale}
    let selectedMesh = null;
    let selectedOriginalMaterials = null; // array to handle multi-material

    const highlightMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: new THREE.Color(0x996600),
      emissiveIntensity: 0.5,
      roughness: 0.5,
      metalness: 0.1,
    });

    function selectMesh(mesh) {
      if (selectedMesh === mesh) return;
      deselectCurrent();

      selectedMesh = mesh;
      // Save original material(s)
      selectedOriginalMaterials = Array.isArray(mesh.material)
        ? mesh.material.slice()
        : mesh.material;

      // Apply highlight, preserving transparency from the original material
      const makeHighlight = (origMat) => {
        const h = highlightMat.clone();
        if (origMat && origMat.transparent) {
          h.transparent = true;
          h.opacity = origMat.opacity;
          h.depthWrite = origMat.depthWrite;
          h.side = origMat.side;
        }
        return h;
      };
      if (Array.isArray(mesh.material)) {
        mesh.material = mesh.material.map((m) => makeHighlight(m));
      } else {
        mesh.material = makeHighlight(mesh.material);
      }

      transformControls.attach(mesh);
      document.getElementById('mode-btns').style.display = 'flex';

      // Show selected info
      const box = new THREE.Box3().setFromObject(mesh);
      const pos = new THREE.Vector3();
      mesh.getWorldPosition(pos);
      const fmt = (v) => v.toFixed(4);
      const panel = document.getElementById('selected-info');
      panel.style.display = 'block';
      panel.innerHTML =
        `<span class="name">${mesh.name || '(unnamed mesh)'}</span><br>` +
        `World position:<br>` +
        `<span>x=${fmt(pos.x)}, y=${fmt(pos.y)}, z=${fmt(pos.z)}</span><br>` +
        `<span style="color:#aaa;font-size:11px;">Drag the gizmo arrows to move</span>`;
    }

    function deselectCurrent() {
      if (!selectedMesh) return;

      // Restore original material
      selectedMesh.material = selectedOriginalMaterials;
      selectedMesh = null;
      selectedOriginalMaterials = null;

      transformControls.detach();
      document.getElementById('mode-btns').style.display = 'none';
      document.getElementById('selected-info').style.display = 'none';
    }

    // Update info panel while dragging
    transformControls.addEventListener('change', () => {
      if (!selectedMesh) return;
      const pos = new THREE.Vector3();
      selectedMesh.getWorldPosition(pos);
      const fmt = (v) => v.toFixed(4);
      const panel = document.getElementById('selected-info');
      panel.innerHTML =
        `<span class="name">${selectedMesh.name || '(unnamed mesh)'}</span><br>` +
        `World position:<br>` +
        `<span>x=${fmt(pos.x)}, y=${fmt(pos.y)}, z=${fmt(pos.z)}</span><br>` +
        `<span style="color:#aaa;font-size:11px;">Drag the gizmo arrows to move</span>`;
    });

    // --- Double-click to select ---
    renderer.domElement.addEventListener('dblclick', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(allMeshes, false);

      if (hits.length > 0) {
        selectMesh(hits[0].object);
      } else {
        deselectCurrent();
      }
    });

    // --- Mode buttons ---
    function setMode(mode) {
      transformControls.setMode(mode);
      document.getElementById('btn-translate').classList.toggle('active', mode === 'translate');
      document.getElementById('btn-rotate').classList.toggle('active', mode === 'rotate');
      document.getElementById('btn-scale').classList.toggle('active', mode === 'scale');
    }
    document.getElementById('btn-translate').addEventListener('click', () => setMode('translate'));
    document.getElementById('btn-rotate').addEventListener('click', () => setMode('rotate'));
    document.getElementById('btn-scale').addEventListener('click', () => setMode('scale'));
    document.getElementById('btn-deselect').addEventListener('click', deselectCurrent);

    // --- Keyboard shortcuts ---
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') deselectCurrent();
      if (!selectedMesh) return;
      if (e.key === 'g' || e.key === 'G') setMode('translate');
      if (e.key === 'r' || e.key === 'R') setMode('rotate');
      if (e.key === 's' || e.key === 'S') setMode('scale');
    });

    // --- Camera reset ---
    let initCamPos = null, initCamTarget = null;

    document.getElementById('btn-reset-cam').addEventListener('click', () => {
      if (!initCamPos) return;
      camera.position.copy(initCamPos);
      orbitControls.target.copy(initCamTarget);
      orbitControls.update();
    });

    // --- Reset button ---
    document.getElementById('btn-reset').addEventListener('click', () => {
      deselectCurrent();
      initialTransforms.forEach((t, mesh) => {
        mesh.position.copy(t.position);
        mesh.quaternion.copy(t.quaternion);
        mesh.scale.copy(t.scale);
      });
    });

    // --- Load model ---
    const loader = new GLTFLoader();
    loader.load('human_head.glb', (gltf) => {
      const model = gltf.scene;
      scene.add(model);

      // Collect all meshes for raycasting
      model.traverse((obj) => {
        if (obj.isMesh) allMeshes.push(obj);
      });

      // Snapshot transforms AFTER per-object overrides are applied (below)
      // — done at end of load callback

      // --- object_4: translucent + 80x scale ---
      // Log all mesh names so we can verify the exact name
      console.log('Meshes in model:', allMeshes.map(m => JSON.stringify(m.name)));

      model.traverse((obj) => {
        if (obj.name.toLowerCase() === 'object_4') {
          obj.scale.set(80, 80, 80);
          obj.position.set(0, 25, -86);
          obj.renderOrder = 1; // render after opaque objects

          const applyTranslucency = (mat) => {
            const m = mat.clone();
            m.transparent = true;
            m.opacity = 0.18;
            m.depthWrite = false;
            m.side = THREE.DoubleSide;
            return m;
          };

          if (Array.isArray(obj.material)) {
            obj.material = obj.material.map(applyTranslucency);
          } else {
            obj.material = applyTranslucency(obj.material);
          }

          console.log('Applied translucency to', obj.name);
        }
      });

      // Snapshot every mesh transform now that all overrides are applied
      allMeshes.forEach((m) => {
        initialTransforms.set(m, {
          position: m.position.clone(),
          quaternion: m.quaternion.clone(),
          scale: m.scale.clone(),
        });
      });

      const box = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      const size = new THREE.Vector3();
      box.getCenter(center);
      box.getSize(size);

      const modelWorldOrigin = new THREE.Vector3();
      model.getWorldPosition(modelWorldOrigin);
      modelOriginMarker.position.copy(modelWorldOrigin);

      const markerScale = Math.max(size.x, size.y, size.z) * 0.025;
      originMarker.scale.setScalar(markerScale / 0.012);
      modelOriginMarker.scale.setScalar(markerScale / 0.012);

      const maxDim = Math.max(size.x, size.y, size.z, SCALE_MAX);
      camera.position.set(0, 0, 250);
      camera.near = maxDim * 0.001;
      camera.far = maxDim * 100;
      camera.updateProjectionMatrix();
      orbitControls.target.set(0, 0, 0);
      orbitControls.update();

      // Snapshot for camera reset
      initCamPos = camera.position.clone();
      initCamTarget = orbitControls.target.clone();

      const fmt = (v) => v.toFixed(4);
      document.getElementById('origin-info').innerHTML =
        `Model origin in world space:<br>` +
        `<span>x=${fmt(modelWorldOrigin.x)}, y=${fmt(modelWorldOrigin.y)}, z=${fmt(modelWorldOrigin.z)}</span><br>` +
        `Bounding box center:<br>` +
        `<span>x=${fmt(center.x)}, y=${fmt(center.y)}, z=${fmt(center.z)}</span><br>` +
        `Bounding box size:<br>` +
        `<span>w=${fmt(size.x)}, h=${fmt(size.y)}, d=${fmt(size.z)}</span>`;
    },
    (xhr) => {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      document.getElementById('origin-info').textContent = `Loading... ${pct}%`;
    },
    (err) => {
      document.getElementById('origin-info').textContent = 'Error loading model: ' + err.message;
      console.error(err);
    });

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Render loop ---
    const camPosEl = document.getElementById('cam-pos');
    const camRotEl = document.getElementById('cam-rot');
    const _deg = (r) => (r * 180 / Math.PI).toFixed(1) + '°';
    function animate() {
      requestAnimationFrame(animate);
      orbitControls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      const p = camera.position;
      camPosEl.textContent = `${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
      const e = camera.rotation;
      camRotEl.textContent = `x:${_deg(e.x)} y:${_deg(e.y)} z:${_deg(e.z)}`;
    }
    animate();
  </script>
</body>
</html>
